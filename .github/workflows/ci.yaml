name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # Runs all test suites at the same time
      matrix:
        suite: [unit, plugin, e2e]
      # If one suite fails, let the other suites finish running anyway
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: matrix:suite == 'unit'
        run: pnpm run typecheck

      # - name: Install E2E Browsers
      #   if: matrix.suite == 'e2e'
      #   run: pnpm exec playwright install --with-deps

      - name: Run ${{ matrix.suite }} tests
        run: pnpm exec vitest run tests/${{ matrix.suite }}
